<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agentsh // policy editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #F4F8F6;
      --bg-panel: #ffffff;
      --bg-surface: #ffffff;
      --bg-hover: #eaf0ed;
      --bg-active: #e2e8e5;
      --border: #e2e8e5;
      --border-bright: #d0d8d5;
      --text: #0A2A1F;
      --text-bright: #06100C;
      --text-dim: #4A362A;
      --accent: #0E4A33;
      --accent-dim: #0a3826;
      --accent-glow: rgba(14, 74, 51, 0.06);
      --error: #C86A3E;
      --error-dim: #a84f2a;
      --error-glow: rgba(200, 106, 62, 0.08);
      --warning: #E2B84A;
      --warning-dim: #9a7b1f;
      --info: #1A8890;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .hidden { display: none !important; }

    /* ── Layout ─────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 40px 1fr 28px;
      height: 100vh;
    }

    /* ── Top bar (stats) ─────────────────────────────────────── */
    #topbar {
      grid-column: 1 / -1;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 24px;
      font-size: 11px;
      letter-spacing: 0.03em;
    }

    #topbar .brand {
      color: var(--accent);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-right: 8px;
      white-space: nowrap;
    }

    #topbar .divider {
      width: 1px;
      height: 16px;
      background: var(--border-bright);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
    }

    .stat-label {
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .stat-value {
      color: var(--text);
    }

    .stat-value.accent { color: var(--accent); }

    #key-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    #key-indicator .key-icon {
      color: var(--accent);
      font-size: 12px;
    }

    #key-indicator-name {
      color: var(--text-dim);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #change-key-btn {
      background: transparent;
      border: 1px solid var(--border-bright);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #change-key-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 12px 16px 8px;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      user-select: none;
      flex-shrink: 0;
    }

    #file-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 0 8px;
    }

    #file-list::-webkit-scrollbar { width: 4px; }
    #file-list::-webkit-scrollbar-track { background: transparent; }
    #file-list::-webkit-scrollbar-thumb { background: var(--border-bright); }

    .file-entry {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      cursor: pointer;
      user-select: none;
      gap: 8px;
      color: var(--text);
      transition: all 0.1s;
      border-left: 2px solid transparent;
      font-size: 11px;
    }

    .file-entry:hover {
      background: var(--bg-hover);
      color: var(--text-bright);
    }

    .file-entry.active {
      background: var(--bg-active);
      border-left-color: var(--accent);
      color: var(--text-bright);
    }

    .file-entry .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Signature indicators */
    .sig-icon {
      flex-shrink: 0;
      font-size: 11px;
      line-height: 1;
      cursor: default;
      transition: all 0.2s;
    }

    .sig-icon-unverified { color: #4FA36A; opacity: 0.5; }
    .sig-icon-verified { color: #0E4A33; }
    .sig-icon-invalid { color: #C86A3E; }

    .sig-info-icon {
      flex-shrink: 0;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      color: var(--info);
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .sig-info-icon:hover {
      opacity: 1;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-dirty {
      background: var(--warning);
    }

    #new-policy-btn {
      margin: 8px 12px;
      padding: 7px 12px;
      background: transparent;
      color: var(--text-dim);
      border: 1px dashed var(--border-bright);
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.05em;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    #new-policy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      border-style: solid;
      background: var(--accent-glow);
    }

    /* ── Main area ───────────────────────────────────────────── */
    #main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-deep);
    }

    #editor-toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 4px 8px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #editor-toolbar button {
      padding: 5px 14px;
      background: transparent;
      color: var(--text-dim);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.15s;
    }

    #editor-toolbar button:hover:not(:disabled) {
      color: var(--accent);
      background: var(--accent-glow);
    }

    #editor-toolbar button:disabled {
      color: var(--text-dim);
      opacity: 0.3;
      cursor: not-allowed;
    }

    #editor-toolbar button.primary {
      color: #F4F8F6;
      background: var(--accent);
      font-weight: 600;
    }

    #editor-toolbar button.primary:hover:not(:disabled) {
      background: var(--accent-dim);
      color: #F4F8F6;
    }

    #editor-toolbar .sep {
      width: 1px;
      height: 16px;
      background: var(--border);
      margin: 0 4px;
    }

    #editor-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      gap: 12px;
      user-select: none;
      z-index: 1;
    }

    #empty-state .empty-icon {
      font-size: 32px;
      color: var(--border-bright);
      font-weight: 300;
    }

    #empty-state p {
      margin: 0;
      font-size: 11px;
      letter-spacing: 0.03em;
    }

    /* ── Bottom toolbar ──────────────────────────────────────── */
    #toolbar {
      grid-column: 1 / -1;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      flex-shrink: 0;
      height: 28px;
    }

    #status-bar {
      flex: 1;
      padding: 0 12px;
      font-size: 11px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #status-bar.success { color: var(--accent); }
    #status-bar.error { color: var(--error); }
    #status-bar.warning { color: var(--warning); }
    #status-bar.info { color: var(--info); }

    /* ── Modal ───────────────────────────────────────────────── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 16, 12, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    #modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-bright);
      padding: 24px 28px;
      min-width: 520px;
      max-width: 660px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(6, 16, 12, 0.12), 0 12px 40px rgba(6, 16, 12, 0.08);
    }

    #modal h3 {
      margin: 0 0 20px 0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
    }

    #modal-input {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border-bright);
      color: var(--text-bright);
      padding: 9px 12px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }

    #modal-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-glow);
    }

    #modal-copy-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    #modal-copy-row label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #modal-copy-select {
      flex: 1;
      background: var(--bg-deep);
      border: 1px solid var(--border-bright);
      color: var(--text-bright);
      padding: 7px 10px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }

    #modal-copy-select:focus {
      border-color: var(--accent);
    }

    #modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    #modal-cancel {
      padding: 7px 18px;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border-bright);
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: all 0.15s;
    }

    #modal-cancel:hover {
      border-color: var(--text);
      color: var(--text);
    }

    #modal-ok {
      padding: 7px 18px;
      background: var(--accent);
      color: #F4F8F6;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: all 0.15s;
    }

    #modal-ok:hover {
      background: var(--accent-dim);
    }

    /* ── File browser ─────────────────────────────────────── */
    #file-browser-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 16, 12, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
      backdrop-filter: blur(4px);
    }

    #file-browser {
      background: var(--bg-surface);
      border: 1px solid var(--border-bright);
      padding: 0;
      width: 520px;
      max-height: 480px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 24px rgba(6, 16, 12, 0.12), 0 12px 40px rgba(6, 16, 12, 0.08);
    }

    #fb-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    #fb-header h3 {
      margin: 0 0 10px 0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
    }

    #fb-path {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #fb-path-input {
      flex: 1;
      background: var(--bg-deep);
      border: 1px solid var(--border-bright);
      color: var(--text-bright);
      padding: 6px 10px;
      font-family: inherit;
      font-size: 11px;
      outline: none;
    }

    #fb-path-input:focus { border-color: var(--accent); }

    #fb-path-go {
      background: var(--bg-deep);
      border: 1px solid var(--border-bright);
      color: var(--text);
      padding: 6px 10px;
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #fb-path-go:hover { border-color: var(--accent); color: var(--accent); }

    #fb-list {
      flex: 1;
      overflow-y: auto;
      min-height: 200px;
      max-height: 300px;
    }

    #fb-list::-webkit-scrollbar { width: 4px; }
    #fb-list::-webkit-scrollbar-track { background: transparent; }
    #fb-list::-webkit-scrollbar-thumb { background: var(--border-bright); }

    .fb-entry {
      display: flex;
      align-items: center;
      padding: 5px 20px;
      cursor: pointer;
      font-size: 11px;
      gap: 8px;
      color: var(--text);
      transition: background 0.08s;
    }

    .fb-entry:hover { background: var(--bg-hover); color: var(--text-bright); }
    .fb-entry.selected { background: var(--bg-active); color: var(--accent); }

    .fb-entry .fb-icon {
      font-size: 12px;
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }

    .fb-entry .fb-icon.dir { color: var(--info); }
    .fb-entry .fb-icon.file { color: var(--text-dim); }

    .fb-entry .fb-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #fb-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
    }

    #fb-cancel {
      padding: 7px 18px;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border-bright);
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #fb-cancel:hover { border-color: var(--text); color: var(--text); }

    #fb-select {
      padding: 7px 18px;
      background: var(--accent);
      color: #F4F8F6;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #fb-select:hover { background: var(--accent-dim); }
    #fb-select:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Scanline overlay ────────────────────────────────────── */
    #scanlines {
      display: none;
    }
  </style>
</head>
<body>

<div id="scanlines"></div>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <span class="brand">agentsh</span>
    <span class="divider"></span>
    <div class="stat">
      <span class="stat-label">policies</span>
      <span class="stat-value" id="stat-count">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">signed</span>
      <span class="stat-value" id="stat-signed">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">current</span>
      <span class="stat-value accent" id="stat-current">—</span>
    </div>
    <div id="key-indicator" class="hidden">
      <span class="divider"></span>
      <span class="key-icon">&#x1f511;</span>
      <span id="key-indicator-name"></span>
      <button id="change-key-btn">change</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">Policies</div>
    <button id="new-policy-btn">+ new policy</button>
    <div id="file-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="editor-toolbar">
      <button id="save-btn" class="primary" disabled>Save</button>
      <span class="sep"></span>
      <button id="validate-btn" disabled>Validate</button>
      <button id="sign-btn" disabled>Sign</button>
      <button id="verify-btn" disabled>Verify</button>
    </div>
    <div id="editor-container">
      <div id="empty-state">
        <div class="empty-icon">&gt;_</div>
        <p>Select a policy or create a new one</p>
      </div>
    </div>
  </div>

  <!-- Bottom status bar -->
  <div id="toolbar">
    <div id="status-bar"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="hidden">
  <div id="modal">
    <h3 id="modal-title"></h3>
    <input id="modal-input" type="text" />
    <div id="modal-copy-row" class="hidden">
      <label for="modal-copy-select">Copy from:</label>
      <select id="modal-copy-select"></select>
    </div>
    <div id="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-ok">Confirm</button>
    </div>
  </div>
</div>

<!-- File browser -->
<div id="file-browser-overlay" class="hidden">
  <div id="file-browser">
    <div id="fb-header">
      <h3>Select File</h3>
      <div id="fb-path">
        <input id="fb-path-input" type="text" placeholder="/" />
        <button id="fb-path-go">Go</button>
      </div>
    </div>
    <div id="fb-list"></div>
    <div id="fb-actions">
      <button id="fb-cancel">Cancel</button>
      <button id="fb-select" disabled>Select</button>
    </div>
  </div>
</div>

<!-- Monaco AMD loader -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script>
(function () {
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────────
  let currentFile = null;
  let currentFileHasSig = false;
  let isDirty = false;
  let editor = null;
  let privateKeyPath = '';
  let signerName = '';
  let policyNames = [];
  let verifyStatus = {};
  // Stores verify result details: { keyId, signer, signedAt, raw }
  let verifyDetails = {};

  // ── DOM helpers ────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function setStatus(msg, type) {
    const bar = $('status-bar');
    bar.textContent = msg;
    bar.className = type || '';
  }

  function setToolbarEnabled(enabled) {
    $('save-btn').disabled = !enabled;
    $('validate-btn').disabled = !enabled;
    $('sign-btn').disabled = !enabled;
    $('verify-btn').disabled = !enabled;
  }

  function updateStats(policies) {
    $('stat-count').textContent = policies.length;
    $('stat-signed').textContent = policies.filter(p => p.hasSig).length;
    $('stat-current').textContent = currentFile || '—';
  }

  // ── Modal ──────────────────────────────────────────────────────────────────
  function showDialog(title, message, type) {
    $('modal-title').textContent = title;
    const input = $('modal-input');
    input.classList.add('hidden');
    $('modal-copy-row').classList.add('hidden');
    $('modal-cancel').classList.add('hidden');

    const textColor = type === 'info' ? 'var(--text-bright)' : 'var(--error)';
    const msgEl = document.createElement('pre');
    msgEl.id = 'modal-message';
    msgEl.style.cssText = `white-space:pre-wrap;word-break:break-word;color:${textColor};font-size:11px;font-family:inherit;background:var(--bg-deep);padding:12px;max-height:300px;overflow:auto;margin:0 0 16px 0;border:1px solid var(--border);`;
    msgEl.textContent = message;
    input.parentNode.insertBefore(msgEl, input);

    $('modal-overlay').classList.remove('hidden');
    $('modal-ok').focus();

    return new Promise((resolve) => {
      function cleanup() {
        $('modal-overlay').classList.add('hidden');
        $('modal-ok').removeEventListener('click', handleOk);
        document.removeEventListener('keydown', handleKey);
        msgEl.remove();
        input.classList.remove('hidden');
        $('modal-cancel').classList.remove('hidden');
      }
      function handleOk() { cleanup(); resolve(); }
      function handleKey(e) { if (e.key === 'Enter' || e.key === 'Escape') handleOk(); }
      $('modal-ok').addEventListener('click', handleOk);
      document.addEventListener('keydown', handleKey);
    });
  }

  function showConfirm(title, message) {
    $('modal-title').textContent = title;
    const input = $('modal-input');
    input.classList.add('hidden');
    $('modal-copy-row').classList.add('hidden');
    $('modal-cancel').classList.remove('hidden');

    const msgEl = document.createElement('p');
    msgEl.id = 'modal-message';
    msgEl.style.cssText = 'color:var(--text);font-size:12px;margin:0 0 16px 0;line-height:1.6;';
    msgEl.textContent = message;
    input.parentNode.insertBefore(msgEl, input);

    $('modal-overlay').classList.remove('hidden');
    $('modal-ok').focus();

    return new Promise((resolve) => {
      function cleanup() {
        $('modal-overlay').classList.add('hidden');
        $('modal-ok').removeEventListener('click', handleOk);
        $('modal-cancel').removeEventListener('click', handleCancel);
        document.removeEventListener('keydown', handleKey);
        msgEl.remove();
        input.classList.remove('hidden');
      }
      function handleOk() { cleanup(); resolve(true); }
      function handleCancel() { cleanup(); resolve(false); }
      function handleKey(e) {
        if (e.key === 'Enter') handleOk();
        if (e.key === 'Escape') handleCancel();
      }
      $('modal-ok').addEventListener('click', handleOk);
      $('modal-cancel').addEventListener('click', handleCancel);
      document.addEventListener('keydown', handleKey);
    });
  }

  function showModal({ title, placeholder, showCopyFrom, policies }) {
    $('modal-title').textContent = title;
    const input = $('modal-input');
    input.value = '';
    input.placeholder = placeholder || '';

    const copyRow = $('modal-copy-row');
    const copySelect = $('modal-copy-select');

    if (showCopyFrom && policies && policies.length > 0) {
      copyRow.classList.remove('hidden');
      copySelect.innerHTML = '<option value="">— blank —</option>';
      policies.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        copySelect.appendChild(opt);
      });
    } else {
      copyRow.classList.add('hidden');
      copySelect.innerHTML = '';
    }

    $('modal-overlay').classList.remove('hidden');
    setTimeout(() => input.focus(), 50);

    return new Promise((resolve, reject) => {
      function cleanup() {
        $('modal-overlay').classList.add('hidden');
        $('modal-ok').removeEventListener('click', handleOk);
        $('modal-cancel').removeEventListener('click', handleCancel);
        input.removeEventListener('keydown', handleKey);
      }
      function handleOk() {
        cleanup();
        resolve({ value: input.value.trim(), copyFrom: showCopyFrom ? copySelect.value : null });
      }
      function handleCancel() { cleanup(); reject(new Error('cancelled')); }
      function handleKey(e) {
        if (e.key === 'Enter') handleOk();
        if (e.key === 'Escape') handleCancel();
      }
      $('modal-ok').addEventListener('click', handleOk);
      $('modal-cancel').addEventListener('click', handleCancel);
      input.addEventListener('keydown', handleKey);
    });
  }

  // ── API helpers ────────────────────────────────────────────────────────────
  async function apiFetch(url, options) {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  // ── Sidebar ────────────────────────────────────────────────────────────────
  async function loadPolicies() {
    try {
      const policies = await apiFetch('/api/policies');
      policyNames = policies.map(p => p.name);
      updateStats(policies);
      renderFileList(policies);
    } catch (err) {
      setStatus('Failed to load policies: ' + err.message, 'error');
    }
  }

  function renderFileList(policies) {
    const list = $('file-list');
    list.innerHTML = '';

    if (policies.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding: 16px; color: var(--text-dim); font-size: 11px;';
      empty.textContent = 'No policies yet.';
      list.appendChild(empty);
      return;
    }

    policies.forEach(({ name, hasSig }) => {
      const entry = document.createElement('div');
      entry.className = 'file-entry' + (name === currentFile ? ' active' : '');
      entry.dataset.name = name;

      const nameSpan = document.createElement('span');
      nameSpan.className = 'file-name';
      nameSpan.textContent = name;
      entry.appendChild(nameSpan);

      if (hasSig) {
        // Info icon (shows verify details on click)
        const details = verifyDetails[name];
        if (details) {
          const infoIcon = document.createElement('span');
          infoIcon.className = 'sig-info-icon';
          infoIcon.textContent = 'ⓘ';
          const summary = details.signer
            ? `Signer: ${details.signer}\nSigned: ${details.signedAt}\nKey ID: ${details.keyId}`
            : `Signed: ${details.signedAt}\nKey ID: ${details.keyId}`;
          infoIcon.title = summary;
          infoIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            showDialog('Signature Details — ' + name,
              (details.signer ? 'Signer:    ' + details.signer + '\n' : '') +
              'Signed at: ' + details.signedAt + '\n' +
              'Key ID:    ' + details.keyId + '\n' +
              'Status:    ' + (verifyStatus[name] === 'verified' ? 'Valid' : 'Invalid'),
              'info'
            );
          });
          entry.appendChild(infoIcon);
        }

        const status = verifyStatus[name] || 'unverified';
        const icon = document.createElement('span');
        icon.className = 'sig-icon';
        if (status === 'verified') {
          icon.classList.add('sig-icon-verified');
          icon.textContent = '✓';
          icon.title = 'Signature verified';
        } else if (status === 'invalid') {
          icon.classList.add('sig-icon-invalid');
          icon.textContent = '✗';
          icon.title = 'Invalid signature detected';
        } else {
          icon.classList.add('sig-icon-unverified');
          icon.textContent = '●';
          icon.title = 'Signature file exists';
        }
        entry.appendChild(icon);
      }

      if (isDirty && name === currentFile) {
        const dirtyDot = document.createElement('span');
        dirtyDot.className = 'dot dot-dirty';
        dirtyDot.title = 'Unsaved changes';
        entry.appendChild(dirtyDot);
      }

      entry.addEventListener('click', () => loadFile(name));
      list.appendChild(entry);
    });
  }

  // ── Load file ──────────────────────────────────────────────────────────────
  async function loadFile(name) {
    if (isDirty && name !== currentFile) {
      if (!await showConfirm('Unsaved Changes', 'You have unsaved changes. Discard them?')) return;
    }
    try {
      const data = await apiFetch(`/api/policies/${encodeURIComponent(name)}`);
      if (editor) {
        const emptyState = document.getElementById('empty-state');
        if (emptyState) emptyState.remove();
        editor.setValue(data.content);
        editor.focus();
      }
      currentFile = name;
      currentFileHasSig = data.hasSig;
      isDirty = false;
      setToolbarEnabled(true);
      setStatus(`Opened: ${name}`, 'info');
      await loadPolicies();
    } catch (err) {
      setStatus('Failed to load file: ' + err.message, 'error');
    }
  }

  // ── Save file ──────────────────────────────────────────────────────────────
  async function saveFile() {
    if (!currentFile || !editor) return;
    let validationPassed = true;
    try {
      const vResult = await apiFetch('/api/validate', {
        method: 'POST',
        body: JSON.stringify({ filename: currentFile, content: editor.getValue() }),
      });
      if (!vResult.success) {
        validationPassed = false;
        const errMsg = vResult.stderr || vResult.stdout || 'Validation failed';
        setStatus('Validation: ' + errMsg, 'warning');
        if (!await showConfirm('Validation Failed', 'Policy validation failed. Save anyway?\n\n' + errMsg)) return;
      }
    } catch (err) {
      validationPassed = false;
      const errMsg = err.message;
      setStatus('Validation error: ' + errMsg, 'warning');
      if (!await showConfirm('Validation Error', 'Could not validate policy. Save anyway?\n\n' + errMsg)) return;
    }
    try {
      await apiFetch(`/api/policies/${encodeURIComponent(currentFile)}`, {
        method: 'POST',
        body: JSON.stringify({ content: editor.getValue() }),
      });
      isDirty = false;
      setStatus('Saved: ' + currentFile, 'success');
      await loadPolicies();
    } catch (err) {
      setStatus('Save failed: ' + err.message, 'error');
    }
  }

  // ── Validate file ──────────────────────────────────────────────────────────
  async function validateFile() {
    if (!currentFile) return;
    setStatus('Validating…', 'info');
    try {
      const result = await apiFetch('/api/validate', {
        method: 'POST',
        body: JSON.stringify({ filename: currentFile, content: editor.getValue() }),
      });
      if (result.success) {
        setStatus('Valid policy.', 'success');
      } else {
        const msg = result.stderr || result.stdout || 'Validation failed';
        setStatus('Invalid: ' + msg, 'error');
      }
    } catch (err) {
      setStatus('Validate error: ' + err.message, 'error');
    }
  }

  // ── Pre-validate helper ────────────────────────────────────────────────────
  async function preValidate() {
    if (!currentFile || !editor) return false;
    try {
      const result = await apiFetch('/api/validate', {
        method: 'POST',
        body: JSON.stringify({ filename: currentFile, content: editor.getValue() }),
      });
      if (!result.success) {
        const msg = result.stderr || result.stdout || 'Validation failed';
        setStatus('Invalid policy: ' + msg, 'error');
        await showDialog('Policy Validation Failed', msg);
        return false;
      }
      return true;
    } catch (err) {
      setStatus('Validation error: ' + err.message, 'error');
      await showDialog('Validation Error', err.message);
      return false;
    }
  }

  // ── Key indicator ──────────────────────────────────────────────────────────
  function updateKeyIndicator() {
    const indicator = $('key-indicator');
    const nameEl = $('key-indicator-name');
    if (privateKeyPath) {
      const basename = privateKeyPath.split('/').pop() || privateKeyPath;
      nameEl.textContent = basename;
      nameEl.title = privateKeyPath;
      indicator.classList.remove('hidden');
    } else {
      indicator.classList.add('hidden');
    }
  }

  // ── File browser ────────────────────────────────────────────────────────────
  function showFileBrowser(opts = {}) {
    const overlay = $('file-browser-overlay');
    const list = $('fb-list');
    const pathInput = $('fb-path-input');
    const selectBtn = $('fb-select');
    const filterExt = opts.filter || null; // e.g. '.json'

    let currentDir = '';
    let selectedFile = null;

    overlay.classList.remove('hidden');
    selectBtn.disabled = true;

    async function browse(dir) {
      try {
        const data = await apiFetch('/api/browse', {
          method: 'POST',
          body: JSON.stringify({ dir: dir || undefined }),
        });
        currentDir = data.dir;
        pathInput.value = currentDir;
        selectedFile = null;
        selectBtn.disabled = true;
        list.innerHTML = '';

        // Parent directory entry
        if (currentDir !== '/') {
          const parent = document.createElement('div');
          parent.className = 'fb-entry';
          parent.innerHTML = '<span class="fb-icon dir">..</span><span class="fb-name">..</span>';
          parent.addEventListener('click', () => {
            const parts = currentDir.split('/').filter(Boolean);
            parts.pop();
            browse('/' + parts.join('/'));
          });
          list.appendChild(parent);
        }

        data.items.forEach(item => {
          const entry = document.createElement('div');
          entry.className = 'fb-entry';

          const icon = document.createElement('span');
          icon.className = 'fb-icon ' + item.type;
          icon.textContent = item.type === 'dir' ? '▸' : '·';

          const name = document.createElement('span');
          name.className = 'fb-name';
          name.textContent = item.name;

          entry.appendChild(icon);
          entry.appendChild(name);

          if (item.type === 'dir') {
            entry.addEventListener('dblclick', () => browse(currentDir + '/' + item.name));
            entry.addEventListener('click', () => {
              list.querySelectorAll('.fb-entry').forEach(e => e.classList.remove('selected'));
              entry.classList.add('selected');
              selectedFile = null;
              selectBtn.disabled = true;
            });
          } else {
            const dimmed = filterExt && !item.name.endsWith(filterExt);
            if (dimmed) entry.style.opacity = '0.4';
            entry.addEventListener('click', () => {
              list.querySelectorAll('.fb-entry').forEach(e => e.classList.remove('selected'));
              entry.classList.add('selected');
              selectedFile = currentDir + '/' + item.name;
              selectBtn.disabled = false;
            });
            entry.addEventListener('dblclick', () => {
              selectedFile = currentDir + '/' + item.name;
              cleanup();
              resolvePromise(selectedFile);
            });
          }

          list.appendChild(entry);
        });
      } catch (err) {
        list.innerHTML = '<div style="padding:16px;color:var(--error);font-size:11px;">Error: ' + err.message + '</div>';
      }
    }

    let resolvePromise, rejectPromise;
    const promise = new Promise((resolve, reject) => {
      resolvePromise = resolve;
      rejectPromise = reject;
    });

    function cleanup() {
      overlay.classList.add('hidden');
      $('fb-select').removeEventListener('click', handleSelect);
      $('fb-cancel').removeEventListener('click', handleCancel);
      $('fb-path-go').removeEventListener('click', handleGo);
      pathInput.removeEventListener('keydown', handlePathKey);
      document.removeEventListener('keydown', handleEsc);
    }

    function handleSelect() { cleanup(); resolvePromise(selectedFile); }
    function handleCancel() { cleanup(); resolvePromise(null); }
    function handleGo() {
      const val = pathInput.value.trim();
      if (!val) return;
      // If it looks like a file path (has extension), try to select it directly
      if (/\.\w+$/.test(val)) {
        selectedFile = val;
        cleanup();
        resolvePromise(selectedFile);
      } else {
        browse(val);
      }
    }
    function handlePathKey(e) { if (e.key === 'Enter') handleGo(); }
    function handleEsc(e) { if (e.key === 'Escape') handleCancel(); }

    $('fb-select').addEventListener('click', handleSelect);
    $('fb-cancel').addEventListener('click', handleCancel);
    $('fb-path-go').addEventListener('click', handleGo);
    pathInput.addEventListener('keydown', handlePathKey);
    document.addEventListener('keydown', handleEsc);

    browse('');
    return promise;
  }

  async function promptForKey() {
    const keyPath = await showFileBrowser({ filter: '.json' });
    if (!keyPath) {
      setStatus('Cancelled: no key path provided.', 'warning');
      return null;
    }
    // Verify it exists
    try {
      const check = await apiFetch('/api/check-file', {
        method: 'POST',
        body: JSON.stringify({ path: keyPath }),
      });
      if (!check.exists) {
        await showDialog('Key Not Found', 'File does not exist:\n' + keyPath);
        return null;
      }
    } catch {
      await showDialog('Error', 'Could not verify key path.');
      return null;
    }
    return keyPath;
  }

  async function changeKey() {
    const keyPath = await promptForKey();
    if (keyPath) {
      privateKeyPath = keyPath;
      updateKeyIndicator();
      setStatus('Private key set: ' + keyPath, 'success');
    }
  }

  // ── Sign file ──────────────────────────────────────────────────────────────
  async function signFile() {
    if (!currentFile) return;
    if (!await preValidate()) return;
    let keyPath = privateKeyPath;
    if (!keyPath) {
      keyPath = await promptForKey();
      if (!keyPath) return;
      privateKeyPath = keyPath;
      updateKeyIndicator();
    }
    if (!signerName) {
      try {
        const result = await showModal({
          title: 'Enter Signer Name',
          placeholder: 'e.g. Alice, ops-team, CI pipeline',
        });
        if (result.value) signerName = result.value;
      } catch { return; }
    }
    setStatus('Signing…', 'info');
    try {
      const result = await apiFetch('/api/sign', {
        method: 'POST',
        body: JSON.stringify({ filename: currentFile, keyPath, signer: signerName }),
      });
      if (result.success) {
        currentFileHasSig = true;
        verifyStatus[currentFile] = 'unverified';
        delete verifyDetails[currentFile];
        setStatus('Signed: ' + currentFile, 'success');
        await loadPolicies();
      } else {
        const msg = result.stderr || result.stdout || 'Sign failed';
        setStatus('Sign failed: ' + msg, 'error');
      }
    } catch (err) {
      setStatus('Sign error: ' + err.message, 'error');
    }
  }

  // ── Verify file ────────────────────────────────────────────────────────────
  async function verifyFile() {
    if (!currentFile) return;
    if (!currentFileHasSig) {
      await showDialog('No Signature', 'This policy has never been signed. No .sig file exists.');
      return;
    }
    if (!privateKeyPath) {
      const keyPath = await promptForKey();
      if (!keyPath) return;
      privateKeyPath = keyPath;
      updateKeyIndicator();
    }
    if (!await preValidate()) return;
    const trustDir = privateKeyPath.substring(0, privateKeyPath.lastIndexOf('/')) || '.';
    setStatus('Verifying…', 'info');
    try {
      const result = await apiFetch(`/api/verify/${encodeURIComponent(currentFile)}`, {
        method: 'POST',
        body: JSON.stringify({ trustDir }),
      });
      if (result.success) {
        // Parse the verify output (JSON with status, key_id, signer, signed_at)
        let details = {};
        try {
          details = JSON.parse(result.stdout);
        } catch {
          details = { raw: result.stdout };
        }
        verifyDetails[currentFile] = {
          keyId: details.key_id || '',
          signer: details.signer || '',
          signedAt: details.signed_at || '',
        };
        verifyStatus[currentFile] = 'verified';
        const signerInfo = details.signer ? ` — signed by ${details.signer}` : '';
        setStatus('Signature verified' + signerInfo + '.', 'success');
      } else {
        const msg = result.stderr || result.stdout || '';
        if (msg.toLowerCase().includes('no signature') || msg.toLowerCase().includes('not found')) {
          setStatus('No signature found.', 'warning');
        } else {
          setStatus('Invalid signature.', 'error');
          verifyStatus[currentFile] = 'invalid';
          verifyDetails[currentFile] = { keyId: '', signer: '', signedAt: '', error: msg };
        }
      }
      await loadPolicies();
    } catch (err) {
      setStatus('Verify error: ' + err.message, 'error');
    }
  }

  // ── New policy ─────────────────────────────────────────────────────────────
  const BLANK_TEMPLATE =
    'version: 1\nname: \ndescription: |\n  \n\nfile_rules: []\ncommand_rules: []\nnetwork_rules: []\n';

  async function newPolicy() {
    let result;
    try {
      result = await showModal({
        title: 'New Policy',
        placeholder: 'my-policy.yaml',
        showCopyFrom: true,
        policies: policyNames,
      });
    } catch { return; }
    let filename = result.value;
    if (!filename) { setStatus('New policy cancelled.', 'warning'); return; }
    if (!/\.ya?ml$/i.test(filename)) filename += '.yaml';
    let content = BLANK_TEMPLATE;
    if (result.copyFrom) {
      try {
        const source = await apiFetch(`/api/policies/${encodeURIComponent(result.copyFrom)}`);
        content = source.content;
      } catch (err) { setStatus('Could not load source: ' + err.message, 'error'); return; }
    }
    try {
      await apiFetch('/api/policies', {
        method: 'POST',
        body: JSON.stringify({ filename, content }),
      });
      setStatus('Created: ' + filename, 'success');
      await loadPolicies();
      await loadFile(filename);
    } catch (err) {
      setStatus('Create failed: ' + err.message, 'error');
    }
  }

  // ── Button wiring ──────────────────────────────────────────────────────────
  $('save-btn').addEventListener('click', saveFile);
  $('validate-btn').addEventListener('click', validateFile);
  $('sign-btn').addEventListener('click', signFile);
  $('verify-btn').addEventListener('click', verifyFile);
  $('new-policy-btn').addEventListener('click', newPolicy);
  $('change-key-btn').addEventListener('click', changeKey);

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      if (currentFile) saveFile();
    }
  });

  // ── Monaco setup ───────────────────────────────────────────────────────────
  require.config({
    paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' }
  });

  require(['vs/editor/editor.main'], function (monaco) {
    // Define custom dark theme
    monaco.editor.defineTheme('cipher', {
      base: 'vs',
      inherit: true,
      rules: [
        { token: 'comment', foreground: '6b7280', fontStyle: 'italic' },
        { token: 'string', foreground: '1A8890' },
        { token: 'keyword', foreground: '0E4A33' },
        { token: 'number', foreground: 'C86A3E' },
        { token: 'type', foreground: '4FA36A' },
      ],
      colors: {
        'editor.background': '#F4F8F6',
        'editor.foreground': '#06100C',
        'editor.lineHighlightBackground': '#eef3f0',
        'editor.selectionBackground': '#c5d6ae66',
        'editorCursor.foreground': '#0E4A33',
        'editorLineNumber.foreground': '#d0d8d5',
        'editorLineNumber.activeForeground': '#4A362A',
        'editor.selectionHighlightBackground': '#c5d6ae33',
        'editorIndentGuide.background': '#e2e8e5',
        'editorIndentGuide.activeBackground': '#d0d8d5',
        'scrollbar.shadow': '#00000000',
        'scrollbarSlider.background': '#d0d8d580',
        'scrollbarSlider.hoverBackground': '#b8c4c080',
        'scrollbarSlider.activeBackground': '#a0aca880',
      }
    });

    const editorContainer = $('editor-container');

    editor = monaco.editor.create(editorContainer, {
      value: '',
      language: 'yaml',
      theme: 'cipher',
      minimap: { enabled: false },
      automaticLayout: true,
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 13,
      lineHeight: 22,
      scrollBeyondLastLine: false,
      renderWhitespace: 'selection',
      tabSize: 2,
      insertSpaces: true,
      wordWrap: 'off',
      smoothScrolling: true,
      cursorBlinking: 'smooth',
      cursorSmoothCaretAnimation: 'on',
      padding: { top: 12 },
    });

    editor.onDidChangeModelContent(() => {
      if (currentFile) {
        isDirty = true;
        const activeEntry = document.querySelector(`.file-entry[data-name="${CSS.escape(currentFile)}"]`);
        if (activeEntry && !activeEntry.querySelector('.dot-dirty')) {
          const dot = document.createElement('span');
          dot.className = 'dot dot-dirty';
          dot.title = 'Unsaved changes';
          activeEntry.appendChild(dot);
        }
      }
    });

    loadPolicies().then(() => {
      if (policyNames.length === 1) loadFile(policyNames[0]);
    });
  });

})();
</script>
</body>
</html>
